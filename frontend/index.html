<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compass — Personal Finance Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div id="error-banner" class="banner hidden"></div>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">✦</span>
        <h1>Compass</h1>
      </div>

      <nav class="primary-nav">
        <button id="nav-dashboard" class="nav-item is-active" type="button">Dashboard</button>
      </nav>

      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <span>Banks</span>
          <button id="add-bank-btn" class="icon-btn" type="button" title="Add bank" aria-label="Add bank">+</button>
        </div>
        <ul id="bank-list" class="bank-list"></ul>
      </div>
    </aside>

    <main id="main-content" class="main-content"></main>
  </div>

  <!-- Bank dialog -->
  <dialog id="bank-dialog" class="dialog">
    <form id="bank-form" method="dialog">
      <h2 id="bank-dialog-title">Add bank</h2>
      <input type="hidden" id="bank-id-input" />
      <label class="field">
        <span>Bank name</span>
        <input type="text" id="bank-name-input" required placeholder="e.g. BCP, Interbank, BBVA" />
      </label>
      <div class="dialog-actions">
        <button type="button" id="bank-delete-btn" class="btn btn-danger hidden">Delete bank</button>
        <div class="dialog-actions-right">
          <button type="button" id="bank-cancel-btn" class="btn btn-ghost">Cancel</button>
          <button type="submit" id="bank-save-btn" class="btn btn-primary">Save</button>
        </div>
      </div>
    </form>
  </dialog>

  <!-- Product dialog -->
  <dialog id="product-dialog" class="dialog">
    <form id="product-form" method="dialog">
      <h2 id="product-dialog-title">Add product</h2>
      <input type="hidden" id="product-id-input" />
      <input type="hidden" id="product-bank-id-input" />

      <label class="field">
        <span>Product type</span>
        <select id="product-type-input" required></select>
      </label>

      <label class="field">
        <span>Name (for your own reference)</span>
        <input type="text" id="product-nickname-input" required placeholder="e.g. Main savings, Travel card" />
      </label>

      <label class="field" id="currency-field-group">
        <span>Currency</span>
        <input type="text" id="product-currency-input" required placeholder="e.g. PEN, USD, EUR" maxlength="6" style="text-transform:uppercase" />
      </label>

      <label class="field" id="balance-field-group">
        <span>Balance</span>
        <input type="number" step="0.01" id="product-balance-input" />
      </label>

      <label class="field" id="account-number-field-group">
        <span>Account number <small class="field-hint">(optional)</small></span>
        <input type="text" id="product-account-number-input" />
      </label>

      <label class="field" id="expiry-field-group">
        <span>Expiry date</span>
        <input type="month" id="product-expiry-input" />
      </label>

      <label class="field" id="credit-line-field-group">
        <span id="credit-line-label-text">Credit line</span>
        <input type="number" step="0.01" id="product-credit-line-input" />
      </label>

      <label class="field" id="interest-rate-field-group">
        <span>Annual interest rate <small class="field-hint">(optional, %)</small></span>
        <input type="number" step="0.01" id="product-interest-rate-input" placeholder="e.g. 3.5" />
      </label>

      <label class="field" id="linked-product-field-group">
        <span id="linked-field-label-text">Linked savings account</span>
        <select id="product-linked-select"></select>
        <small class="field-hint" id="linked-field-hint">Debit cards have no balance of their own — purchases will move money in and out of this account.</small>
      </label>

      <div class="dialog-actions">
        <button type="button" id="product-delete-btn" class="btn btn-danger hidden">Delete product</button>
        <div class="dialog-actions-right">
          <button type="button" id="product-cancel-btn" class="btn btn-ghost">Cancel</button>
          <button type="submit" id="product-save-btn" class="btn btn-primary">Save</button>
        </div>
      </div>
    </form>
  </dialog>

  <!-- Transaction dialog -->
  <dialog id="transaction-dialog" class="dialog">
    <form id="transaction-form" method="dialog">
      <h2 id="transaction-dialog-title">Add transaction</h2>
      <input type="hidden" id="transaction-product-id-input" />

      <label class="field">
        <span>Date</span>
        <input type="date" id="transaction-date-input" required />
      </label>

      <label class="field">
        <span>Name</span>
        <input type="text" id="transaction-name-input" required placeholder="e.g. Grocery shopping, Salary" />
      </label>

      <label class="field">
        <span>Description <small class="field-hint">(optional)</small></span>
        <input type="text" id="transaction-description-input" placeholder="Any extra detail" />
      </label>

      <label class="field">
        <span>Category <small class="field-hint">(optional — pick one or type your own)</small></span>
        <input type="text" id="transaction-category-input" list="category-suggestions" placeholder="e.g. Groceries" />
        <datalist id="category-suggestions"></datalist>
      </label>

      <label class="field">
        <span>Direction</span>
        <select id="transaction-direction-input" required>
          <option value="inflow">Inflow (money in)</option>
          <option value="outflow">Outflow (money out)</option>
        </select>
      </label>

      <label class="field">
        <span>Amount</span>
        <input type="number" step="0.01" min="0" id="transaction-amount-input" required />
      </label>

      <label class="field">
        <span>Currency</span>
        <input type="text" id="transaction-currency-input" required maxlength="6" style="text-transform:uppercase" />
      </label>

      <label class="field" id="transaction-rate-field-group">
        <span>Exchange rate <small class="field-hint" id="transaction-rate-hint"></small></span>
        <input type="number" step="0.0001" id="transaction-rate-input" />
      </label>

      <div class="dialog-actions">
        <div class="dialog-actions-left">
          <button type="button" id="transaction-delete-btn" class="btn btn-danger hidden">Delete</button>
          <button type="button" id="transaction-save-template-btn" class="btn btn-ghost btn-small">Save as template</button>
        </div>
        <div class="dialog-actions-right">
          <button type="button" id="transaction-cancel-btn" class="btn btn-ghost">Cancel</button>
          <button type="submit" id="transaction-save-btn" class="btn btn-primary">Save</button>
        </div>
      </div>
    </form>
  </dialog>

  <!-- Transfer dialog -->
  <dialog id="transfer-dialog" class="dialog">
    <form id="transfer-form" method="dialog">
      <h2>Transfer money</h2>
      <p class="field-hint" style="margin-bottom: 14px;">
        Use this for money moving between your own products — paying a card from
        savings, funding a time deposit, account-to-account moves. It won't show up
        as spending or income anywhere.
      </p>

      <label class="field">
        <span>From</span>
        <select id="transfer-source-select" required></select>
      </label>

      <label class="field">
        <span>To</span>
        <select id="transfer-destination-select" required></select>
      </label>

      <label class="field">
        <span>Date</span>
        <input type="date" id="transfer-date-input" required />
      </label>

      <label class="field">
        <span>Name <small class="field-hint">(optional)</small></span>
        <input type="text" id="transfer-name-input" placeholder="e.g. Credit card payment" />
      </label>

      <label class="field">
        <span>Amount <small class="field-hint" id="transfer-amount-hint"></small></span>
        <input type="number" step="0.01" min="0" id="transfer-amount-input" required />
      </label>

      <label class="field" id="transfer-rate-field-group">
        <span>Exchange rate <small class="field-hint" id="transfer-rate-hint"></small></span>
        <input type="number" step="0.0001" id="transfer-rate-input" />
      </label>

      <div class="dialog-actions">
        <div class="dialog-actions-right">
          <button type="button" id="transfer-cancel-btn" class="btn btn-ghost">Cancel</button>
          <button type="submit" id="transfer-save-btn" class="btn btn-primary">Transfer</button>
        </div>
      </div>
    </form>
  </dialog>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
